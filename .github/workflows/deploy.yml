name: Deploy Directly to VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: okiru
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/okiru/okiru-pro-main || git clone https://github.com/Lethabo-Scofield/okiru-pro-main.git
            cd /home/okiru/okiru-pro-main
            git pull origin main

            docker build -t web-prod:latest -f apps/web/Dockerfile .
            docker rm -f web-prod || true
            docker run -d --name web-prod -p 80:80 web-prod:latest
