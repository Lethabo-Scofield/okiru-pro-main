name: Build, Push, Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/lethabo-scofield/web:latest -f apps/web/Dockerfile .

      - name: Push image
        run: docker push ghcr.io/lethabo-scofield/web:latest

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: okiru
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/lethabo-scofield/web:latest
            docker rm -f web-prod || true
            docker run -d --name web-prod -p 80:80 ghcr.io/lethabo-scofield/web:latest
