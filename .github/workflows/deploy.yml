name: Build, Push, Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read   # needed for actions/checkout

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Login to GHCR using your Personal Access Token
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build Docker image
      - name: Build image
        run: docker build -t ghcr.io/lethabo-scofield/web:latest -f apps/web/Dockerfile .

      # 4. Push Docker image to GitHub Container Registry
      - name: Push image
        run: docker push ghcr.io/lethabo-scofield/web:latest

      # 5. Deploy to your VM over SSH
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: okiru
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/lethabo-scofield/web:latest
            docker rm -f web-prod || true
            docker run -d --name web-prod -p 80:80 ghcr.io/lethabo-scofield/web:latest
