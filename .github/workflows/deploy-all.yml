name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild all images'
        required: false
        default: 'false'

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/lethabo-scofield/okiru-pro-main/web:latest
            ghcr.io/lethabo-scofield/okiru-pro-main/web:${{ github.sha }}

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/lethabo-scofield/okiru-pro-main/api:latest
            ghcr.io/lethabo-scofield/okiru-pro-main/api:${{ github.sha }}

  build-compute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/Computation-Engine
          file: apps/Computation-Engine/Dockerfile
          push: true
          tags: |
            ghcr.io/lethabo-scofield/okiru-pro-main/compute-engine:latest
            ghcr.io/lethabo-scofield/okiru-pro-main/compute-engine:${{ github.sha }}

  deploy:
    needs: [build-web, build-api, build-compute]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy all services to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.VM_USER }}/okiru-pro-main

            echo "=== Syncing code ==="
            git stash || true
            git pull origin main
            git stash pop || true

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling latest images ==="
            docker compose -f docker-compose.production.yml pull

            echo "=== Starting all services ==="
            docker compose -f docker-compose.production.yml up -d

            echo "=== Service status ==="
            sleep 10
            docker compose -f docker-compose.production.yml ps

            echo "=== Deploy complete ==="
