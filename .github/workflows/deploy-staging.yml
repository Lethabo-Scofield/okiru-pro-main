name: Deploy to Staging

concurrency:
  group: staging-deployment
  cancel-in-progress: false

on:
  push:
    branches:
      - develop
      - staging
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: false
        type: boolean

env:
  ACR_REGISTRY: okiruproacrde4d539b.azurecr.io
  IMAGE_TAG: ${{ github.sha }}
  NAMESPACE: okiru-pro-staging
  DOMAIN: okiru-staging.20.164.101.114.nip.io

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.tags.outputs.api_image }}
      web_image: ${{ steps.tags.outputs.web_image }}
      compute_image: ${{ steps.tags.outputs.compute_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          echo "api_image=${{ env.ACR_REGISTRY }}/okiru-pro/api:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "web_image=${{ env.ACR_REGISTRY }}/okiru-pro/web:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "compute_image=${{ env.ACR_REGISTRY }}/okiru-pro/compute:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Compute image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/Computation-Engine
          file: ./apps/Computation-Engine/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.compute_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.okiru.20.164.101.114.nip.io
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Configure kubectl
        run: |
          KUBECONFIG_FILE="$GITHUB_WORKSPACE/kubeconfig"
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > "$KUBECONFIG_FILE"
          export KUBECONFIG="$KUBECONFIG_FILE"
          echo "KUBECONFIG=$KUBECONFIG_FILE" >> $GITHUB_ENV
          kubectl config current-context
          kubectl get nodes

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets from GitHub Secrets
        run: |
          # Create mongodb-credentials secret
          kubectl create secret generic mongodb-credentials \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=MONGO_INITDB_ROOT_USERNAME="${{ secrets.STAGING_MONGO_INITDB_ROOT_USERNAME }}" \
            --from-literal=MONGO_INITDB_ROOT_PASSWORD="${{ secrets.STAGING_MONGO_INITDB_ROOT_PASSWORD }}" \
            --from-literal=MONGODB_URI="${{ secrets.STAGING_MONGODB_URI }}" \
            --from-literal=MONGODB_DB_NAME="${{ secrets.STAGING_MONGODB_DB_NAME }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create arangodb-credentials secret. Keys must match every
          # `secretKeyRef` in base/deployments/{web,api,compute}.yaml,
          # otherwise the deployment fails with CreateContainerConfigError.
          kubectl create secret generic arangodb-credentials \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=ARANGO_ROOT_PASSWORD="${{ secrets.STAGING_ARANGO_ROOT_PASSWORD }}" \
            --from-literal=ARANGO_PASSWORD="${{ secrets.STAGING_ARANGO_ROOT_PASSWORD }}" \
            --from-literal=ARANGO_URL="${{ secrets.STAGING_ARANGO_URL }}" \
            --from-literal=ARANGO_DB_NAME="${{ secrets.STAGING_ARANGO_DB_NAME }}" \
            --from-literal=ARANGO_DB="${{ secrets.STAGING_ARANGO_DB_NAME }}" \
            --from-literal=ARANGO_USER="${{ secrets.STAGING_ARANGO_USER }}" \
            --from-literal=ARANGO_VERIFY_SSL="${{ secrets.STAGING_ARANGO_VERIFY_SSL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create redis-credentials secret
          kubectl create secret generic redis-credentials \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=REDIS_PASSWORD="${{ secrets.STAGING_REDIS_PASSWORD }}" \
            --from-literal=REDIS_URL="${{ secrets.STAGING_REDIS_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create session-secrets secret
          kubectl create secret generic session-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=JWT_SECRET="${{ secrets.STAGING_JWT_SECRET }}" \
            --from-literal=SESSION_SECRET="${{ secrets.STAGING_SESSION_SECRET }}" \
            --from-literal=API_INTERNAL_KEY="${{ secrets.STAGING_API_INTERNAL_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create ACR pull secret if credentials provided
          if [ -n "${{ secrets.ACR_USERNAME }}" ] && [ -n "${{ secrets.ACR_PASSWORD }}" ]; then
            kubectl create secret docker-registry acr-pull-secret \
              --namespace=${{ env.NAMESPACE }} \
              --docker-server=${{ env.ACR_REGISTRY }} \
              --docker-username=${{ secrets.ACR_USERNAME }} \
              --docker-password=${{ secrets.ACR_PASSWORD }} \
              --dry-run=client -o yaml | kubectl apply -f -
          fi

          # Create external API keys secret if any are provided.
          # Keep this list in sync with the prod workflow + base manifests.
          kubectl create secret generic external-api-keys \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.STAGING_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.STAGING_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT="${{ secrets.STAGING_AZURE_OPENAI_DEPLOYMENT }}" \
            --from-literal=AZURE_OPENAI_FAST_DEPLOYMENT="${{ secrets.STAGING_AZURE_OPENAI_FAST_DEPLOYMENT }}" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="${{ secrets.STAGING_AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="${{ secrets.STAGING_AZURE_OPENAI_API_VERSION }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.STAGING_GROQ_API_KEY }}" \
            --from-literal=SMTP_HOST="${{ secrets.STAGING_SMTP_HOST }}" \
            --from-literal=SMTP_PORT="${{ secrets.STAGING_SMTP_PORT }}" \
            --from-literal=SMTP_USER="${{ secrets.STAGING_SMTP_USER }}" \
            --from-literal=SMTP_PASS="${{ secrets.STAGING_SMTP_PASS }}" \
            --from-literal=SMTP_FROM="${{ secrets.STAGING_SMTP_FROM }}" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${{ secrets.STAGING_AZURE_STORAGE_CONNECTION_STRING }}" \
            --from-literal=AZURE_STORAGE_ACCOUNT_NAME="${{ secrets.STAGING_AZURE_STORAGE_ACCOUNT_NAME }}" \
            --from-literal=AZURE_SEARCH_ENDPOINT="${{ secrets.STAGING_AZURE_SEARCH_ENDPOINT }}" \
            --from-literal=AZURE_SEARCH_API_KEY="${{ secrets.STAGING_AZURE_SEARCH_API_KEY }}" \
            --from-literal=AZURE_SEARCH_INDEX_NAME="${{ secrets.STAGING_AZURE_SEARCH_INDEX_NAME }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Label secrets for management tracking
        run: |
          echo "=== Labeling secrets for management tracking ==="

          kubectl label secret -n ${{ env.NAMESPACE }} mongodb-credentials \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          kubectl label secret -n ${{ env.NAMESPACE }} arangodb-credentials \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          kubectl label secret -n ${{ env.NAMESPACE }} redis-credentials \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          kubectl label secret -n ${{ env.NAMESPACE }} session-secrets \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          kubectl label secret -n ${{ env.NAMESPACE }} external-api-keys \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          kubectl label secret -n ${{ env.NAMESPACE }} azure-backup-credentials \
            managed-by=gha deployment-id=${{ github.run_id }} updated-at=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --overwrite 2>/dev/null || true

          echo "=== Secrets labeled successfully ==="

      - name: Update Kustomize image tags
        run: |
          cd kubernetes/infrastructure/overlays/staging

          echo "=== Updating image tags in Kustomize overlay ==="
          kustomize edit set image \
            okiruproacrde4d539b.azurecr.io/okiru-pro/api=${{ needs.build-and-push.outputs.api_image }} \
            okiruproacrde4d539b.azurecr.io/okiru-pro/web=${{ needs.build-and-push.outputs.web_image }} \
            okiruproacrde4d539b.azurecr.io/okiru-pro/compute=${{ needs.build-and-push.outputs.compute_image }}

          echo "=== Updated kustomization.yaml ==="
          cat kustomization.yaml

      - name: Deploy to Kubernetes
        id: deploy
        timeout-minutes: 15
        run: |
          cd kubernetes/infrastructure

          echo "=== Rendering and applying Kustomize manifests ==="
          kustomize build overlays/staging | kubectl apply -f -

          echo "=== Restarting deployments to pick up new images ==="
          kubectl rollout restart deployment/api -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/web -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/compute -n ${{ env.NAMESPACE }}

          echo "=== Waiting for deployments to be ready ==="
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=300s || {
            echo "WARNING: API deployment rollout timed out. Checking pod status..."
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=api
            kubectl describe deployment/api -n ${{ env.NAMESPACE }} | tail -20
          }
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=300s || {
            echo "WARNING: Web deployment rollout timed out. Checking pod status..."
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=web
          }
          kubectl rollout status deployment/compute -n ${{ env.NAMESPACE }} --timeout=300s || {
            echo "WARNING: Compute deployment rollout timed out. Checking pod status..."
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=compute
          }

          echo "=== Deployment completed ==="
          kubectl get pods -n ${{ env.NAMESPACE }}

      - name: Run smoke tests
        if: ${{ !inputs.skip_tests }}
        id: smoke_tests
        run: |
          echo "=== Waiting for services to stabilize ==="
          sleep 30

          # Use the staging domain
          HOST="${{ env.DOMAIN }}"
          echo "Testing against $HOST"

          echo "=== Running smoke tests against $HOST ==="

          # Test HTTP endpoint
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."

            # Try HTTPS first
            if curl -sfk --max-time 10 "https://$HOST/" > /dev/null 2>&1; then
              echo "HTTPS web check passed"
              curl -sfk --max-time 10 "https://$HOST/api/health" && echo "HTTPS API health passed"
              break
            fi

            # Fall back to HTTP
            if curl -sf --max-time 10 "http://$HOST/" > /dev/null 2>&1; then
              echo "HTTP web check passed"
              curl -sf --max-time 10 "http://$HOST/api/health" && echo "HTTP API health passed"
              break
            fi

            # Port-forward fallback
            echo "External test failed, testing via port-forward..."
            kubectl port-forward svc/web 5001:5001 -n ${{ env.NAMESPACE }} &
            PORT_FORWARD_PID=$!
            sleep 5
            if curl -sf --max-time 5 "http://localhost:5001/" > /dev/null 2>&1; then
              echo "Port-forward web check passed"
              kill $PORT_FORWARD_PID 2>/dev/null || true
              break
            fi
            kill $PORT_FORWARD_PID 2>/dev/null || true

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "ERROR: Smoke tests failed after $MAX_RETRIES attempts"
            exit 1
          fi

          echo "=== All smoke tests passed ==="

      - name: Run service readiness checks
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "=== Checking service readiness ==="

          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get endpoints -n ${{ env.NAMESPACE }}
          kubectl get hpa -n ${{ env.NAMESPACE }}

          echo "=== Service checks completed ==="

      - name: Commit updated kustomization.yaml to git
        if: success() && steps.deploy.outcome == 'success'
        run: |
          echo "=== Committing updated image tags to git ==="

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cd kubernetes/infrastructure/overlays/staging

          if git diff --quiet kustomization.yaml; then
            echo "No changes to kustomization.yaml - skipping commit"
            exit 0
          fi

          git add kustomization.yaml
          git commit -m "chore(deploy): update staging image tags to ${{ github.sha }}

          Automated deployment from GitHub Actions workflow.
          - API: ${{ needs.build-and-push.outputs.api_image }}
          - Web: ${{ needs.build-and-push.outputs.web_image }}
          - Compute: ${{ needs.build-and-push.outputs.compute_image }}

          Workflow Run: ${{ github.run_id }}"

          git push origin HEAD:staging

          echo "✅ Successfully committed and pushed updated kustomization.yaml"

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "=== Rolling back deployments ==="
          kubectl rollout undo deployment/api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/web -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/compute -n ${{ env.NAMESPACE }}

          echo "=== Waiting for rollback to complete ==="
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/compute -n ${{ env.NAMESPACE }} --timeout=180s

          echo "=== Rollback completed ==="

      - name: Cleanup
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/kubeconfig"
