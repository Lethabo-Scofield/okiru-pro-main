name: Build and Deploy to AKS

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'
  pull_request:
    branches: [ "main", "master" ]
    types: [closed]

env:
  AZURE_CONTAINER_REGISTRY: "okiruproacrde4d539b"
  CONTAINER_REGISTRY_URL: "okiruproacrde4d539b.azurecr.io"
  RESOURCE_GROUP: "okiru-pro-rg"
  CLUSTER_NAME: "okiru-pro-aks"
  NAMESPACE: "okiru-pro"

jobs:
  # =====================================================
  # BUILD AND PUSH IMAGES
  # =====================================================
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-tag.outputs.image_tag }}
      short_sha: ${{ steps.generate-tag.outputs.short_sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate unique image tag
        id: generate-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Generated Image Tag: ${IMAGE_TAG}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.26.1'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build types
        run: pnpm --filter @okiru/types build

      - name: Build API
        run: pnpm --filter @okiru/api build

      - name: Build Web
        run: pnpm --filter rest-express build
        env:
          VITE_API_URL: https://api.okiru.co.za

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_URL }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/api:${{ steps.generate-tag.outputs.image_tag }}
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.generate-tag.outputs.image_tag }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/web:${{ steps.generate-tag.outputs.image_tag }}
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.generate-tag.outputs.image_tag }}

      - name: Build and push Compute image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/Computation-Engine/Dockerfile
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/compute:${{ steps.generate-tag.outputs.image_tag }}
            ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/compute:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================
  # DEPLOY TO AKS
  # =====================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || (github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --overwrite-existing

      - name: Update Kustomize image tags and deploy
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          REGISTRY="${{ env.CONTAINER_REGISTRY_URL }}"
          
          echo "Deploying with image tag: ${IMAGE_TAG}"
          
          cd kubernetes/infrastructure/overlays/prod
          
          # Update image tags in kustomization.yaml
          kustomize edit set image \
            okiruproacrde4d539b.azurecr.io/okiru-pro/api=${REGISTRY}/okiru-pro/api:${IMAGE_TAG} \
            okiruproacrde4d539b.azurecr.io/okiru-pro/web=${REGISTRY}/okiru-pro/web:${IMAGE_TAG} \
            okiruproacrde4d539b.azurecr.io/okiru-pro/compute=${REGISTRY}/okiru-pro/compute:${IMAGE_TAG}
          
          echo "=== Updated kustomization.yaml ==="
          cat kustomization.yaml
          
          cd ..
          
          echo "=== Rendering and applying Kustomize manifests ==="
          kustomize build prod | kubectl apply -f -

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/compute -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Verify deployments
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get deployments -n ${{ env.NAMESPACE }}

      - name: Smoke tests
        run: |
          echo "Running smoke tests..."
          kubectl get pods -n ${{ env.NAMESPACE }}
          
          # Get ingress IP
          INGRESS_IP=$(kubectl get ingress okiru-ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Ingress IP: ${INGRESS_IP}"
          
          # Wait for services
          sleep 30
          
          # Test health endpoint
          for i in {1..5}; do
            echo "Health check attempt $i..."
            curl -sf "https://${INGRESS_IP}.nip.io/api/health" && echo " ✓ API is healthy" && break
            if [ $i -eq 5 ]; then
              echo "✗ Health check failed after 5 attempts"
              exit 1
            fi
            sleep 10
          done

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/web -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/compute -n ${{ env.NAMESPACE }}
          
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/compute -n ${{ env.NAMESPACE }} --timeout=180s
          
          echo "Rollback completed"

      - name: Save deployment info
        run: |
          echo "Deployment completed successfully!"
          echo "Image Tag: ${{ needs.build.outputs.image_tag }}"
          echo "Short SHA: ${{ needs.build.outputs.short_sha }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          # Save to file for reference
          cat > deployment-info.txt << EOF
          Deployment Info
          ================
          Image Tag: ${{ needs.build.outputs.image_tag }}
          Git SHA: ${{ needs.build.outputs.short_sha }}
          Deployed At: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Triggered By: ${{ github.actor }}
          Commit: ${{ github.sha }}
          EOF

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment-info.txt
          retention-days: 30

  # =====================================================
  # NOTIFY
  # =====================================================
  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Image Tag: ${{ needs.build.outputs.image_tag }}"
          echo "URL: https://okiru.20.164.101.114.nip.io"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs for details"
