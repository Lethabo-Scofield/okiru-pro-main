name: Build and deploy Web to Azure Web App - okiru-rg

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-web-azure.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.26.1'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build types package
        run: pnpm --filter @okiru/types build

      - name: Build Web app
        run: pnpm --filter rest-express build
        env:
          VITE_API_URL: https://api.okiru.co.za

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/apps/web
          mkdir -p deploy/packages/types
          cp -r apps/web/dist deploy/apps/web/dist
          cp apps/web/package.json deploy/apps/web/
          cp -r packages/types deploy/packages/
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp pnpm-workspace.yaml deploy/

      - name: Install production dependencies for deploy
        run: |
          cd deploy
          pnpm install --no-frozen-lockfile --prod

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B82997CD8D174AFCBC1C9FD06CB5CAE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_88FEAEDEF9D14B6492F587809E8656BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3513122C482F464AADCBF385295E27D8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'okiru-rg'
          slot-name: 'Production'
          package: ./deploy
