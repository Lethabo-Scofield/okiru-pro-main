name: Security Scan

on:
  push:
    branches: [main, master, staging]
    paths:
      - 'apps/**/Dockerfile'
      - 'apps/**/*.ts'
      - 'apps/**/*.js'
  pull_request:
    branches: [main, master, staging]
    paths:
      - 'apps/**/Dockerfile'
      - 'apps/**/*.ts'
      - 'apps/**/*.js'
  schedule:
    # Run daily at 8 AM UTC
    - cron: '0 8 * * *'

jobs:
  # =====================================================
  # TRIVY IMAGE SCAN
  # =====================================================
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: api
            dockerfile: ./apps/api/Dockerfile
            context: .
          - name: web
            dockerfile: ./apps/web/Dockerfile
            context: .
          - name: compute
            dockerfile: ./apps/Computation-Engine/Dockerfile
            context: ./apps/Computation-Engine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app.context }}
          file: ${{ matrix.app.dockerfile }}
          push: false
          load: true
          tags: scan-${{ matrix.app.name }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-${{ matrix.app.name }}:latest'
          format: 'sarif'
          output: 'trivy-${{ matrix.app.name }}-results.sarif'
          exit-code: '0'  # Don't fail build, just report
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.app.name }}-results.sarif'
          category: 'trivy-${{ matrix.app.name }}'

      - name: Run Trivy in table format (for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-${{ matrix.app.name }}:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # =====================================================
  # DOCKERFILE LINT (Hadolint)
  # =====================================================
  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint on API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./apps/api/Dockerfile
          failure-threshold: error

      - name: Run Hadolint on Web Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./apps/web/Dockerfile
          failure-threshold: error

      - name: Run Hadolint on Compute Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./apps/Computation-Engine/Dockerfile
          failure-threshold: error

  # =====================================================
  # KUBERNETES MANIFEST SCAN
  # =====================================================
  k8s-scan:
    name: Kubernetes Manifest Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on Kubernetes manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './kubernetes/infrastructure'
          format: 'sarif'
          output: 'trivy-k8s-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload K8s scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-k8s-results.sarif'
          category: 'trivy-k8s'

  # =====================================================
  # SUMMARY
  # =====================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, hadolint, k8s-scan]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image Scan | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile Lint | ${{ needs.hadolint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Manifest Scan | ${{ needs.k8s-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All results are available in the Security tab." >> $GITHUB_STEP_SUMMARY
