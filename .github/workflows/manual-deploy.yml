name: Manual Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
      image_tag:
        description: 'Image tag to deploy (leave empty to build new)'
        required: false
        type: string
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        type: boolean
        default: false

env:
  AZURE_CONTAINER_REGISTRY: "okiruproacrde4d539b"
  CONTAINER_REGISTRY_URL: "okiruproacrde4d539b.azurecr.io"
  RESOURCE_GROUP: "okiru-pro-rg"
  CLUSTER_NAME: "okiru-pro-aks"
  NAMESPACE: "okiru-pro"

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.inputs.image_tag == ''
    outputs:
      image_tag: ${{ steps.generate-tag.outputs.image_tag }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: generate-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "image_tag=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '9.x'

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @okiru/api build
          pnpm --filter @okiru/web build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_URL }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push images
        run: |
          TAG="${{ steps.generate-tag.outputs.image_tag }}"
          docker build -t ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/api:${TAG} -f apps/api/Dockerfile .
          docker build -t ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/web:${TAG} -f apps/web/Dockerfile .
          docker build -t ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/compute:${TAG} -f apps/Computation-Engine/Dockerfile .
          
          docker push ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/api:${TAG}
          docker push ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/web:${TAG}
          docker push ${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/compute:${TAG}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || github.event.inputs.image_tag != '')
    
    steps:
      - name: Determine image tag
        id: get-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.build.outputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy with unique tag
        run: |
          IMAGE_TAG="${{ steps.get-tag.outputs.tag }}"
          echo "Deploying image tag: ${IMAGE_TAG}"
          
          kubectl set image deployment/api api="${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/api:${IMAGE_TAG}" -n ${{ env.NAMESPACE }}
          kubectl set image deployment/web web="${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/web:${IMAGE_TAG}" -n ${{ env.NAMESPACE }}
          kubectl set image deployment/compute compute="${{ env.CONTAINER_REGISTRY_URL }}/okiru-pro/compute:${IMAGE_TAG}" -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/compute -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Smoke tests
        if: github.event.inputs.skip_tests == 'false'
        run: |
          sleep 30
          INGRESS_IP=$(kubectl get ingress okiru-ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -sf "https://${INGRESS_IP}.nip.io/api/health" || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/web -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/compute -n ${{ env.NAMESPACE }}
