# CronJob Failure Monitoring
# Monitors backup and scheduled job failures across environments
# Sends alerts and can trigger auto-remediation

name: CronJob Monitoring

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check (staging, production, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - staging
          - production

env:
  PROD_NAMESPACE: okiru-pro
  STAGING_NAMESPACE: okiru-pro-staging

jobs:
  monitor-prod:
    name: Monitor Production CronJobs
    if: ${{ inputs.environment == 'production' || inputs.environment == 'all' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context

      - name: Check CronJob status
        id: check_prod
        run: |
          export KUBECONFIG=kubeconfig
          NAMESPACE="${{ env.PROD_NAMESPACE }}"

          echo "=== Checking CronJob status in $NAMESPACE ==="

          FAILED_JOBS=""
          WARNING_JOBS=""

          # List all CronJobs
          CRONJOBS=$(kubectl get cronjobs -n $NAMESPACE -o name 2>/dev/null || true)

          if [ -z "$CRONJOBS" ]; then
            echo "No CronJobs found in namespace $NAMESPACE"
            echo "prod_status=healthy" >> $GITHUB_OUTPUT
            exit 0
          fi

          for cronjob in $CRONJOBS; do
            NAME=$(echo $cronjob | cut -d'/' -f2)
            echo "Checking $NAME..."

            # Get last scheduled time
            LAST_SCHEDULE=$(kubectl get cronjob $NAME -n $NAMESPACE -o jsonpath='{.status.lastScheduleTime}' 2>/dev/null || echo "Unknown")
            echo "  Last scheduled: $LAST_SCHEDULE"

            # Get failed jobs count
            ACTIVE_JOBS=$(kubectl get jobs -n $NAMESPACE --selector=cronjob-name=$NAME -o name 2>/dev/null || true)

            for job in $ACTIVE_JOBS; do
              JOB_NAME=$(echo $job | cut -d'/' -f2)
              STATUS=$(kubectl get job $JOB_NAME -n $NAMESPACE -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
              SUCCEEDED=$(kubectl get job $JOB_NAME -n $NAMESPACE -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "0")
              FAILED=$(kubectl get job $JOB_NAME -n $NAMESPACE -o jsonpath='{.status.failed}' 2>/dev/null || echo "0")

              if [ "$STATUS" = "True" ] || [ "$FAILED" -gt 0 ]; then
                echo "  ❌ FAILED: $JOB_NAME (failed: $FAILED)"
                FAILED_JOBS="$FAILED_JOBS $NAME/$JOB_NAME"
              elif [ "$SUCCEEDED" -gt 0 ]; then
                echo "  ✅ Succeeded: $JOB_NAME"
              else
                echo "  ⏳ Running/Pending: $JOB_NAME"
              fi
            done

            # Check if CronJob has history of failures
            FAILED_HISTORY=$(kubectl get cronjob $NAME -n $NAMESPACE -o jsonpath='{.spec.failedJobsHistoryLimit}')
            if [ -n "$FAILED_HISTORY" ] && [ "$FAILED_HISTORY" -gt 2 ]; then
              WARNING_JOBS="$WARNING_JOBS $NAME(high-fail-limit)"
            fi
          done

          echo ""
          echo "=== Summary ==="
          if [ -n "$FAILED_JOBS" ]; then
            echo "❌ FAILED JOBS: $FAILED_JOBS"
            echo "prod_status=failed" >> $GITHUB_OUTPUT
            echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          else
            echo "✅ All CronJobs healthy"
            echo "prod_status=healthy" >> $GITHUB_OUTPUT
          fi

          if [ -n "$WARNING_JOBS" ]; then
            echo "⚠️ WARNINGS: $WARNING_JOBS"
          fi

      - name: Alert on failure (Production)
        if: steps.check_prod.outputs.prod_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = '${{ steps.check_prod.outputs.failed_jobs }}'.trim();

            // Create issue if critical
            const issueBody = `## 🚨 CronJob Failure Alert (Production)

            **Environment:** Production (${{ env.PROD_NAMESPACE }})
            **Detected:** ${new Date().toISOString()}
            **Failed Jobs:** ${failedJobs}

            ### Next Steps
            1. Check job logs: \`kubectl logs -n ${{ env.PROD_NAMESPACE }} job/<job-name>\`
            2. Review backup storage capacity
            3. Verify Azure Blob Storage credentials
            4. Run manual backup if needed: \`kubectl create job --from=cronjob/mongodb-backup backup-manual-$(date +%s)\`

            ### Runbook
            See [backup-failures.md](docs/runbooks/mongodb-connection-failures.md)
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production CronJob Failure: ${failedJobs}`,
              body: issueBody,
              labels: ['alert', 'production', 'cronjob', 'automated'],
            });

      - name: Cleanup
        if: always()
        run: rm -f kubeconfig

  monitor-staging:
    name: Monitor Staging CronJobs
    if: ${{ inputs.environment == 'staging' || inputs.environment == 'all' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context

      - name: Check CronJob status
        id: check_staging
        run: |
          export KUBECONFIG=kubeconfig
          NAMESPACE="${{ env.STAGING_NAMESPACE }}"

          echo "=== Checking CronJob status in $NAMESPACE ==="

          FAILED_JOBS=""

          CRONJOBS=$(kubectl get cronjobs -n $NAMESPACE -o name 2>/dev/null || true)

          if [ -z "$CRONJOBS" ]; then
            echo "No CronJobs found in namespace $NAMESPACE"
            echo "staging_status=healthy" >> $GITHUB_OUTPUT
            exit 0
          fi

          for cronjob in $CRONJOBS; do
            NAME=$(echo $cronjob | cut -d'/' -f2)
            echo "Checking $NAME..."

            ACTIVE_JOBS=$(kubectl get jobs -n $NAMESPACE --selector=cronjob-name=$NAME -o name 2>/dev/null || true)

            for job in $ACTIVE_JOBS; do
              JOB_NAME=$(echo $job | cut -d'/' -f2)
              STATUS=$(kubectl get job $JOB_NAME -n $NAMESPACE -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
              FAILED=$(kubectl get job $JOB_NAME -n $NAMESPACE -o jsonpath='{.status.failed}' 2>/dev/null || echo "0")

              if [ "$STATUS" = "True" ] || [ "$FAILED" -gt 0 ]; then
                echo "  ❌ FAILED: $JOB_NAME"
                FAILED_JOBS="$FAILED_JOBS $NAME/$JOB_NAME"
              fi
            done
          done

          if [ -n "$FAILED_JOBS" ]; then
            echo "❌ FAILED JOBS: $FAILED_JOBS"
            echo "staging_status=failed" >> $GITHUB_OUTPUT
            echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          else
            echo "✅ All CronJobs healthy"
            echo "staging_status=healthy" >> $GITHUB_OUTPUT
          fi

      - name: Alert on failure (Staging)
        if: steps.check_staging.outputs.staging_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = '${{ steps.check_staging.outputs.failed_jobs }}'.trim();

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Staging CronJob Failure: ${failedJobs}`,
              body: `## Staging CronJob Failure

            **Environment:** Staging (${{ env.STAGING_NAMESPACE }})
            **Failed Jobs:** ${failedJobs}

            This is a non-critical alert as staging environment may have intermittent issues.

            **Action:** Review when convenient, but production health is priority.`,
              labels: ['alert', 'staging', 'cronjob', 'automated'],
            });

      - name: Cleanup
        if: always()
        run: rm -f kubeconfig

  report:
    name: Generate Report
    needs: [monitor-prod, monitor-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## CronJob Monitoring Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Production Status: ${{ needs.monitor-prod.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Staging Status: ${{ needs.monitor-staging.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
