services:
  arangodb:
    image: arangodb:3.11
    container_name: okiru_arango
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=Okiru123!
    volumes:
      - arango_data:/var/lib/arangodb3

  redis:
    image: redis:7
    container_name: okiru_redis
    ports:
      - "6379:6379"

volumes:
  arango_data:
