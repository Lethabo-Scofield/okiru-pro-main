worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    gzip        on;
    gzip_types  text/plain application/json application/javascript text/css;

    client_max_body_size 50M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Upstreams
    upstream api_backend    { server api:5000; }
    upstream web_frontend   { server web:5001; }
    upstream compute_engine { server computation-engine:8000; }

    # ── HTTP → redirect to HTTPS (uncomment after SSL setup) ──
    # server {
    #     listen 80;
    #     server_name okiru.yourdomain.com;
    #     location /.well-known/acme-challenge/ { root /var/www/certbot; }
    #     location / { return 301 https://$host$request_uri; }
    # }

    # ── Main server (HTTP for initial setup, switch to 443 after SSL) ──
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # Computation Engine (internal API, exposed for admin/debug)
        location /compute/ {
            proxy_pass http://compute_engine/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # ArangoDB Web UI (restrict in production)
        location /arango/ {
            proxy_pass http://arangodb:8529/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else → Web frontend
        location / {
            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
