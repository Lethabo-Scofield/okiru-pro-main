# Let's Encrypt ClusterIssuer for cert-manager
# Provides automatic SSL certificate provisioning

---
# Staging issuer for testing (rate limits are higher)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: okiru-pro
spec:
  acme:
    # ACME server URL for staging (no rate limits, but untrusted certs)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Email for renewal notifications
    email: admin@okiru-pro.com
    # Secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx
            podTemplate:
              spec:
                nodeSelector:
                  kubernetes.io/os: linux

---
# Production issuer for live certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
  namespace: okiru-pro
spec:
  acme:
    # ACME server URL for production (trusted certs, rate limited)
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@okiru-pro.com
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - http01:
          ingress:
            class: nginx
            podTemplate:
              spec:
                nodeSelector:
                  kubernetes.io/os: linux
        # Optional: Configure which domains this solver handles
        # selector:
        #   dnsNames:
        #     - okiru-pro.com
        #     - api.okiru-pro.com
