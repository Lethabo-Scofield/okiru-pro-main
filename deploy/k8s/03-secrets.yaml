# Kubernetes Secrets Template
# IMPORTANT: Do NOT commit this file with real values to Git!
# Use: kubectl apply -f secrets.yaml after filling in values
# Or use: kubectl create secret generic ... for each secret

---
# MongoDB Authentication Credentials
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  # Root admin credentials for MongoDB
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_SECURE_PASSWORD_123"
  # Database connection string components
  MONGODB_URI: "mongodb://admin:CHANGE_ME_SECURE_PASSWORD_123@mongodb:27017/okiru-pro?authSource=admin"
  MONGODB_DB_NAME: "okiru-pro"

---
# ArangoDB Authentication Credentials
apiVersion: v1
kind: Secret
metadata:
  name: arangodb-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  ARANGO_ROOT_PASSWORD: "CHANGE_ME_SECURE_ARANGO_123"
  # Connection string for applications
  ARANGO_URL: "http+tcp://root:CHANGE_ME_SECURE_ARANGO_123@arangodb:8529"
  ARANGO_DB_NAME: "okiru_pro"

---
# Redis Authentication (if using AUTH)
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASS_123"
  REDIS_URL: "redis://:CHANGE_ME_REDIS_PASS_123@redis:6379/0"

---
# Session/JWT Secrets for API
apiVersion: v1
kind: Secret
metadata:
  name: session-secrets
  namespace: okiru-pro
type: Opaque
stringData:
  # JWT signing secret - generate strong random string
  JWT_SECRET: "generate-a-64-character-random-string-here-change-me"
  SESSION_SECRET: "another-64-character-random-string-for-sessions"
  # API internal communication key
  API_INTERNAL_KEY: "internal-api-key-for-service-communication"

---
# External Service API Keys
apiVersion: v1
kind: Secret
metadata:
  name: external-api-keys
  namespace: okiru-pro
type: Opaque
stringData:
  # Azure Container Registry credentials
  ACR_USERNAME: "your-acr-username"
  ACR_PASSWORD: "your-acr-password"
  # Add other third-party API keys here
  SENDGRID_API_KEY: "your-sendgrid-api-key"
  STRIPE_SECRET_KEY: "your-stripe-secret-key"

---
# Image Pull Secret for ACR
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull-secret
  namespace: okiru-pro
type: kubernetes.io/dockerconfigjson
data:
  # Generate with: kubectl create secret docker-registry acr-pull-secret \
  #   --namespace okiru-pro \
  #   --docker-server=yourregistry.azurecr.io \
  #   --docker-username=your-acr-username \
  #   --docker-password=your-acr-password \
  #   --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  .dockerconfigjson: "BASE64_ENCODED_DOCKER_CONFIG"
