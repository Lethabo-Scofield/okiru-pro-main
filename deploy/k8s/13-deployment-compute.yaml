# Computation Engine Deployment (Python/FastAPI)
# Handles heavy computational tasks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute
  namespace: okiru-pro
  labels:
    app: compute
    component: backend
    tier: compute
    workload-type: compute-heavy
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: compute
  template:
    metadata:
      labels:
        app: compute
        component: backend
        tier: compute
        workload-type: compute-heavy
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: tier
                    operator: In
                    values:
                      - api
                      - web
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - compute
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
        - name: wait-for-arangodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z arangodb 8529; do
                echo "Waiting for ArangoDB..."
                sleep 2
              done
      containers:
        - name: compute
          image: okiruproacrde4d539b.azurecr.io/okiru-pro/compute:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: COMPUTE_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGINS
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
            - name: ARANGO_URL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
          volumeMounts:
            - name: tmp-vol
              mountPath: /tmp
            - name: model-storage
              mountPath: /app/models
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp-vol
          emptyDir:
            sizeLimit: 500Mi
        - name: model-storage
          emptyDir:
            sizeLimit: 1Gi
