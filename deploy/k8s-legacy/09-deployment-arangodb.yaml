# ArangoDB Deployment with Health Checks
# Graph database for complex relationship queries
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arangodb
  namespace: okiru-pro
  labels:
    app: arangodb
    component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arangodb
  template:
    metadata:
      labels:
        app: arangodb
        component: database
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - arangodb
                topologyKey: kubernetes.io/hostname
      containers:
        - name: arangodb
          image: arangodb:3.11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8529
              name: arangodb
              protocol: TCP
          env:
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_ROOT_PASSWORD
            - name: ARANGO_STORAGE_ENGINE
              value: "rocksdb"
            - name: ARANGO_DEFAULT_DATABASE
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_DB_NAME
          volumeMounts:
            - name: arangodb-data
              mountPath: /var/lib/arangodb3
            - name: arangodb-apps
              mountPath: /var/lib/arangodb3-apps
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Liveness probe - TCP check on ArangoDB port
          livenessProbe:
            tcpSocket:
              port: 8529
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          # Readiness probe
          readinessProbe:
            tcpSocket:
              port: 8529
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # Startup probe
          startupProbe:
            tcpSocket:
              port: 8529
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
      volumes:
        - name: arangodb-data
          persistentVolumeClaim:
            claimName: arangodb-pvc
        - name: arangodb-apps
          emptyDir: {}  # Temporary storage for apps
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
