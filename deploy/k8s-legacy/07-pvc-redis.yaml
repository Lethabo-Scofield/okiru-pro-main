# PersistentVolumeClaim for Redis
# 1GB Standard SSD for Redis persistence (AOF/RDB)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: okiru-pro
  labels:
    app: redis
    component: cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-standard-ssd
  resources:
    requests:
      storage: 1Gi
