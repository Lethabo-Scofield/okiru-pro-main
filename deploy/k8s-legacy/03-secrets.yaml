# Kubernetes Secrets Template
# IMPORTANT: Do NOT commit this file with real values to Git!
#
# Usage:
#   1. Copy this file: cp 03-secrets.yaml 03-secrets.local.yaml
#   2. Edit 03-secrets.local.yaml with real values
#   3. Apply: kubectl apply -f 03-secrets.local.yaml
#   4. NEVER commit the .local.yaml file
#
# Or create secrets directly via CLI:
#   kubectl create secret generic mongodb-credentials \
#     --namespace okiru-pro \
#     --from-literal=MONGO_INITDB_ROOT_USERNAME=admin \
#     --from-literal=MONGO_INITDB_ROOT_PASSWORD='<REAL_PASSWORD>'

---
# MongoDB Authentication Credentials
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  MONGODB_URI: "mongodb://admin:REPLACE_WITH_REAL_PASSWORD@mongodb:27017/okiru-pro?authSource=admin"
  MONGODB_DB_NAME: "okiru-pro"

---
# ArangoDB Authentication Credentials
apiVersion: v1
kind: Secret
metadata:
  name: arangodb-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  ARANGO_ROOT_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  ARANGO_URL: "http+tcp://root:REPLACE_WITH_REAL_PASSWORD@arangodb:8529"
  ARANGO_DB_NAME: "okiru_pro"

---
# Redis Authentication
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: okiru-pro
type: Opaque
stringData:
  REDIS_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  REDIS_URL: "redis://:REPLACE_WITH_REAL_PASSWORD@redis:6379/0"

---
# Session/JWT Secrets for API and Web
apiVersion: v1
kind: Secret
metadata:
  name: session-secrets
  namespace: okiru-pro
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
  SESSION_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
  API_INTERNAL_KEY: "REPLACE_WITH_RANDOM_STRING"

---
# External Service API Keys
apiVersion: v1
kind: Secret
metadata:
  name: external-api-keys
  namespace: okiru-pro
type: Opaque
stringData:
  ACR_USERNAME: "REPLACE_WITH_ACR_USERNAME"
  ACR_PASSWORD: "REPLACE_WITH_ACR_PASSWORD"
  GROQ_API_KEY: "REPLACE_WITH_GROQ_KEY"
  AZURE_OPENAI_ENDPOINT: "REPLACE_WITH_AZURE_OPENAI_ENDPOINT"
  AZURE_OPENAI_API_KEY: "REPLACE_WITH_AZURE_OPENAI_KEY"
  SMTP_HOST: "REPLACE_WITH_SMTP_HOST"
  SMTP_PORT: "587"
  SMTP_USER: "REPLACE_WITH_SMTP_USER"
  SMTP_PASS: "REPLACE_WITH_SMTP_PASS"
  SENDGRID_API_KEY: "REPLACE_WITH_SENDGRID_KEY"
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_KEY"

---
# Image Pull Secret for ACR
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull-secret
  namespace: okiru-pro
type: kubernetes.io/dockerconfigjson
data:
  # Generate with: kubectl create secret docker-registry acr-pull-secret \
  #   --namespace okiru-pro \
  #   --docker-server=okiruproacrde4d539b.azurecr.io \
  #   --docker-username=<ACR_USERNAME> \
  #   --docker-password=<ACR_PASSWORD> \
  #   --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  .dockerconfigjson: "BASE64_ENCODED_DOCKER_CONFIG"
