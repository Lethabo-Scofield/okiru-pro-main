# ClusterIP Services for internal communication
# Each service exposes pods within the cluster

---
# MongoDB Service
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: okiru-pro
  labels:
    app: mongodb
    component: database
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP

---
# ArangoDB Service
apiVersion: v1
kind: Service
metadata:
  name: arangodb
  namespace: okiru-pro
  labels:
    app: arangodb
    component: database
spec:
  type: ClusterIP
  selector:
    app: arangodb
  ports:
    - name: arangodb
      port: 8529
      targetPort: 8529
      protocol: TCP

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: okiru-pro
  labels:
    app: redis
    component: cache
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: okiru-pro
  labels:
    app: api
    component: backend
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP

---
# Web Service
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: okiru-pro
  labels:
    app: web
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      protocol: TCP

---
# Compute Service
apiVersion: v1
kind: Service
metadata:
  name: compute
  namespace: okiru-pro
  labels:
    app: compute
    component: backend
spec:
  type: ClusterIP
  selector:
    app: compute
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
