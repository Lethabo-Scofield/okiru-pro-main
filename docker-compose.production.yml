version: "3.9"

services:
  # ─── DATABASES ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: okiru_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-okiru}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-OkiruMongo123!}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  arangodb:
    image: arangodb:3.11
    container_name: okiru_arango
    restart: always
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_PASSWORD:-Okiru123!}
    volumes:
      - arango_data:/var/lib/arangodb3
    ports:
      - "127.0.0.1:8529:8529"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8529/_api/version"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: okiru_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── APPLICATION SERVICES ────────────────────────────────────
  computation-engine:
    build:
      context: .
      dockerfile: apps/Computation-Engine/Dockerfile
    container_name: okiru_compute
    restart: always
    depends_on:
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ARANGO_URL: http://arangodb:8529
      ARANGO_USER: root
      ARANGO_PASSWORD: ${ARANGO_PASSWORD:-Okiru123!}
      ARANGO_DB: ${ARANGO_DB:-bbbee_db}
      REDIS_URL: redis://redis:6379
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_RELOAD: "false"
      LOG_LEVEL: info
      ALLOW_IN_MEMORY_DB: "0"
    ports:
      - "127.0.0.1:8000:8000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: okiru_api
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGO_URI: mongodb://${MONGO_USER:-okiru}:${MONGO_PASSWORD:-OkiruMongo123!}@mongodb:27017/okiru?authSource=admin
      ARANGO_URL: http://arangodb:8529
      ARANGO_DB: ${ARANGO_DB:-bbbee_db}
      ARANGO_USER: root
      ARANGO_PASSWORD: ${ARANGO_PASSWORD:-Okiru123!}
      COMPUTE_ENGINE_URL: http://computation-engine:8000
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://okiru.yourdomain.com}
    ports:
      - "127.0.0.1:5000:5000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: okiru_web
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5001"
      MONGODB_URI: mongodb://${MONGO_USER:-okiru}:${MONGO_PASSWORD:-OkiruMongo123!}@mongodb:27017/okiru_web?authSource=admin
    ports:
      - "127.0.0.1:5001:5001"

  # ─── REVERSE PROXY ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: okiru_nginx
    restart: always
    depends_on:
      - api
      - web
      - computation-engine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  # ─── SSL CERT RENEWAL (optional, runs once then exits) ──────
  certbot:
    image: certbot/certbot
    container_name: okiru_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  mongo_data:
  arango_data:
  certbot_certs:
  certbot_www:
