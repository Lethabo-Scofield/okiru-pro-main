# Note: ACR pull secret is a docker config JSON stored as base64
# Store the entire base64-encoded dockerconfigjson in Key Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acr-pull-secret
  namespace: okiru-pro
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: azure-kv-store
  target:
    name: acr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .acrpullsecret }}"
  data:
    - secretKey: acrpullsecret
      remoteRef:
        key: acr-pull-secret
