# SecretStore for Azure Key Vault using Workload Identity
# 
# IMPORTANT: Replace placeholders before applying:
# - {vault-name}: Your Key Vault name (e.g., okiru-pro-kv)
# - {tenant-id}: Your Azure AD tenant ID
# - Ensure the service account has Workload Identity annotations

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-kv-store
  namespace: okiru-pro
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://{vault-name}.vault.azure.net
      serviceAccountRef:
        name: external-secrets-sa
      # Alternative: use managed identity (for AKS with managed identity enabled)
      # authType: ManagedIdentity
      # identityId: {managed-identity-client-id}
---
# ServiceAccount for Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: okiru-pro
  annotations:
    azure.workload.identity/client-id: "{identity-client-id}"
    azure.workload.identity/tenant-id: "{tenant-id}"
automountServiceAccountToken: true
