apiVersion: batch/v1
kind: Job
metadata:
  name: arangodb-seed
  namespace: okiru-pro
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-arangodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z arangodb 8529; do
                echo "Waiting for ArangoDB..."
                sleep 2
              done
      containers:
        - name: seed
          image: node:20-alpine
          workingDir: /workspace
          command:
            - sh
            - -c
            - |
              # Install dependencies
              apk add --no-cache git
              corepack enable && corepack prepare pnpm@10.26.1 --activate

              # Clone the repo (using local source mounted via ConfigMap would be better, but this works)
              # Instead, we'll run the seed directly from the source

              # Download source files
              cd /tmp
              cat > seed.js << 'SEED_EOF'
              const { ArangoDB } = require('arangojs');

              // Hardcoded sector configs from the corrected sectorConfig.ts
              const sectorConfigs = [
                {
                  sectorCode: "RCOGP",
                  scorecardType: "Generic",
                  totalMaxPoints: 135,
                  pillarConfigs: {
                    ownership: { maxPoints: 25, weightingPercent: 25 },
                    managementControl: { maxPoints: 20, weightingPercent: 20 },
                    employmentEquity: { maxPoints: 0, weightingPercent: 0 },
                    skillsDevelopment: { maxPoints: 20, weightingPercent: 20 },
                    preferentialProcurement: { maxPoints: 25, weightingPercent: 25 },
                    enterpriseDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    socioEconomicDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                },
                {
                  sectorCode: "ICT",
                  scorecardType: "Generic",
                  totalMaxPoints: 115,
                  pillarConfigs: {
                    ownership: { maxPoints: 25, weightingPercent: 25 },
                    managementControl: { maxPoints: 25, weightingPercent: 25 },
                    employmentEquity: { maxPoints: 10, weightingPercent: 10 },
                    skillsDevelopment: { maxPoints: 20, weightingPercent: 20 },
                    preferentialProcurement: { maxPoints: 20, weightingPercent: 20 },
                    enterpriseDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    socioEconomicDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                },
                {
                  sectorCode: "AGRI",
                  scorecardType: "Generic",
                  totalMaxPoints: 115,
                  pillarConfigs: {
                    ownership: { maxPoints: 25, weightingPercent: 25 },
                    managementControl: { maxPoints: 10, weightingPercent: 10 },
                    employmentEquity: { maxPoints: 10, weightingPercent: 10 },
                    skillsDevelopment: { maxPoints: 15, weightingPercent: 15 },
                    preferentialProcurement: { maxPoints: 35, weightingPercent: 35 },
                    enterpriseDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    socioEconomicDevelopment: { maxPoints: 10, weightingPercent: 10 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                },
                {
                  sectorCode: "QSE_10M",
                  scorecardType: "Generic",
                  totalMaxPoints: 135,
                  pillarConfigs: {
                    ownership: { maxPoints: 25, weightingPercent: 25 },
                    managementControl: { maxPoints: 25, weightingPercent: 25 },
                    employmentEquity: { maxPoints: 0, weightingPercent: 0 },
                    skillsDevelopment: { maxPoints: 25, weightingPercent: 25 },
                    preferentialProcurement: { maxPoints: 35, weightingPercent: 35 },
                    enterpriseDevelopment: { maxPoints: 15, weightingPercent: 15 },
                    socioEconomicDevelopment: { maxPoints: 5, weightingPercent: 5 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                },
                {
                  sectorCode: "QSE_10P",
                  scorecardType: "Generic",
                  totalMaxPoints: 125,
                  pillarConfigs: {
                    ownership: { maxPoints: 25, weightingPercent: 25 },
                    managementControl: { maxPoints: 25, weightingPercent: 25 },
                    employmentEquity: { maxPoints: 0, weightingPercent: 0 },
                    skillsDevelopment: { maxPoints: 20, weightingPercent: 20 },
                    preferentialProcurement: { maxPoints: 30, weightingPercent: 30 },
                    enterpriseDevelopment: { maxPoints: 10, weightingPercent: 10 },
                    socioEconomicDevelopment: { maxPoints: 10, weightingPercent: 10 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                },
                {
                  sectorCode: "FSC",
                  scorecardType: "Generic",
                  totalMaxPoints: 115,
                  pillarConfigs: {
                    ownership: { maxPoints: 20, weightingPercent: 20 },
                    managementControl: { maxPoints: 10, weightingPercent: 10 },
                    employmentEquity: { maxPoints: 10, weightingPercent: 10 },
                    skillsDevelopment: { maxPoints: 25, weightingPercent: 25 },
                    preferentialProcurement: { maxPoints: 25, weightingPercent: 25 },
                    enterpriseDevelopment: { maxPoints: 10, weightingPercent: 10 },
                    socioEconomicDevelopment: { maxPoints: 10, weightingPercent: 10 },
                    yesInitiative: { maxPoints: 3, weightingPercent: 3 }
                  }
                }
              ];

              async function seedArangoDB() {
                const arangoUrl = process.env.ARANGO_URL || 'http://arangodb:8529';
                const arangoPassword = process.env.ARANGO_ROOT_PASSWORD || '';
                const dbName = process.env.ARANGO_DB_NAME || 'okiru_production';

                console.log('Connecting to ArangoDB at', arangoUrl);

                const db = new ArangoDB({
                  url: arangoUrl,
                  auth: { username: 'root', password: arangoPassword },
                });

                try {
                  // Ensure database exists
                  const dbs = await db.listDatabases();
                  if (!dbs.includes(dbName)) {
                    await db.createDatabase(dbName);
                    console.log('Created database:', dbName);
                  }

                  // Use the database
                  const okiruDb = db.database(dbName);

                  // Ensure sector_rules collection exists
                  const collections = await okiruDb.listCollections();
                  const sectorRulesExists = collections.some(c => c.name === 'sector_rules');

                  if (!sectorRulesExists) {
                    await okiruDb.createCollection('sector_rules');
                    console.log('Created collection: sector_rules');
                  }

                  const collection = okiruDb.collection('sector_rules');

                  // Upsert sector configs
                  for (const config of sectorConfigs) {
                    const key = `${config.sectorCode}_${config.scorecardType}`.toLowerCase().replace(/[^a-z0-9_-]/g, '_');
                    const doc = {
                      _key: key,
                      sectorCode: config.sectorCode,
                      scorecardType: config.scorecardType,
                      totalMaxPoints: config.totalMaxPoints,
                      pillarConfigs: config.pillarConfigs,
                      updatedAt: new Date().toISOString(),
                    };

                    try {
                      await collection.document(key);
                      await collection.update(key, doc);
                      console.log('Updated sector:', config.sectorCode);
                    } catch (e) {
                      await collection.save(doc, { overwriteMode: 'ignore' });
                      console.log('Created sector:', config.sectorCode);
                    }
                  }

                  console.log('Seed completed successfully!');
                  process.exit(0);
                } catch (error) {
                  console.error('Seed failed:', error.message);
                  process.exit(1);
                }
              }

              seedArangoDB();
              SEED_EOF

              npm install arangojs
              node seed.js
          env:
            - name: ARANGO_URL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_URL
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_ROOT_PASSWORD
            - name: ARANGO_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_DB_NAME
  backoffLimit: 3
