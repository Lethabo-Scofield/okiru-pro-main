apiVersion: batch/v1
kind: Job
metadata:
  name: arangodb-seed
  namespace: okiru-pro
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-arangodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z arangodb 8529; do
                echo "Waiting for ArangoDB..."
                sleep 2
              done
      containers:
        - name: seed
          image: node:20-alpine
          workingDir: /workspace
          command:
            - sh
            - -c
            - |
              npm install arangojs
              node /scripts/seed.js
          env:
            - name: ARANGO_URL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_URL
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_ROOT_PASSWORD
            - name: ARANGO_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_DB_NAME
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
      volumes:
        - name: seed-script
          configMap:
            name: arangodb-seed-script
  backoffLimit: 3
