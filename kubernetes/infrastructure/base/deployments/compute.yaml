apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute
  labels:
    app: compute
    component: backend
    tier: compute
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: compute
  template:
    metadata:
      labels:
        app: compute
        component: backend
        tier: compute
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - compute
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
        - name: wait-for-arangodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z arangodb 8529; do
                echo "Waiting for ArangoDB..."
                sleep 2
              done
      containers:
        - name: compute
          image: okiruproacrde4d539b.azurecr.io/okiru-pro/compute:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: COMPUTE_PORT
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
            - name: ARANGO_URL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_URL
            - name: API_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: session-secrets
                  key: API_INTERNAL_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Compute engine has no /health route; use TCP for liveness and /docs for readiness
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
