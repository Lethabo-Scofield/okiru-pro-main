apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: compute-hpa
  labels:
    app: compute
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: compute
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
