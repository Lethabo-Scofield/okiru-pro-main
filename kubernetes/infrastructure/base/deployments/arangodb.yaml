apiVersion: apps/v1
kind: Deployment
metadata:
  name: arangodb
  labels:
    app: arangodb
    component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arangodb
  template:
    metadata:
      labels:
        app: arangodb
        component: database
    spec:
      containers:
        - name: arangodb
          image: arangodb:3.11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8529
              name: arangodb
              protocol: TCP
          env:
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_ROOT_PASSWORD
          volumeMounts:
            - name: arangodb-data
              mountPath: /var/lib/arangodb3
          args:
            - arangod
            - --server.endpoint=tcp://0.0.0.0:8529
            - --log.level=info
            - --server.statistics=true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_db/_system/_admin/server/availability
              port: 8529
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /_db/_system/_admin/server/availability
              port: 8529
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /_db/_system/_admin/server/availability
              port: 8529
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: arangodb-data
          persistentVolumeClaim:
            claimName: arangodb-pvc
