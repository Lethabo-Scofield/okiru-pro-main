apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
    component: backend
    tier: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: backend
        tier: api
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
      containers:
        - name: api
          image: okiruproacrde4d539b.azurecr.io/okiru-pro/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_PORT
            - name: API_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGIN
            - name: COMPUTE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: COMPUTE_ENGINE_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: ARANGO_URL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_URL
            - name: ARANGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_PASSWORD
            - name: ARANGO_DB
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_DB_NAME
            - name: ARANGO_USER
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_USER
            - name: ARANGO_VERIFY_SSL
              valueFrom:
                secretKeyRef:
                  name: arangodb-credentials
                  key: ARANGO_VERIFY_SSL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secrets
                  key: JWT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secrets
                  key: SESSION_SECRET
            - name: API_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: session-secrets
                  key: API_INTERNAL_KEY
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: external-api-keys
                  key: AZURE_OPENAI_ENDPOINT
                  optional: true
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: external-api-keys
                  key: AZURE_OPENAI_API_KEY
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: external-api-keys
                  key: GROQ_API_KEY
                  optional: true
          envFrom:
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: tmp-vol
              mountPath: /tmp
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 5000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp-vol
          emptyDir:
            sizeLimit: 200Mi
