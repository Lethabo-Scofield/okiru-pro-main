# Network Policies for Okiru Pro
# These policies restrict pod-to-pod traffic to only necessary communication
#
# WARNING: Enable these only after verifying your specific network requirements.
# Test in staging first as they can block legitimate traffic.

# Default deny all ingress traffic (apply this carefully)
# apiVersion: networking.k8s.io/v1
# kind: NetworkPolicy
# metadata:
#   name: default-deny-ingress
#   namespace: okiru-pro
# spec:
#   podSelector: {}
#   policyTypes:
#     - Ingress

---
# Allow MongoDB traffic only from API, Web, and Compute
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: web
        - podSelector:
            matchLabels:
              app: compute
      ports:
        - protocol: TCP
          port: 27017

---
# Allow ArangoDB traffic only from API and Compute
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arangodb-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: arangodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: compute
      ports:
        - protocol: TCP
          port: 8529

---
# Allow Redis traffic only from API and Web
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: web
      ports:
        - protocol: TCP
          port: 6379

---
# Allow API traffic from Ingress and Web pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    # From ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
    # From web frontend (for internal API calls)
    - from:
        - podSelector:
            matchLabels:
              app: web
      ports:
        - protocol: TCP
          port: 5000

---
# Allow Web traffic only from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5001

---
# Allow Compute traffic from API only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: compute-access
  namespace: okiru-pro
spec:
  podSelector:
    matchLabels:
      app: compute
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
