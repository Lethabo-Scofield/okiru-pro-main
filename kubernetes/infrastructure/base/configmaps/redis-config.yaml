apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    # Memory management
    maxmemory 128mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000

    # Security
    protected-mode yes

    # Performance
    tcp-keepalive 300
    timeout 0

    # Logging
    loglevel notice
