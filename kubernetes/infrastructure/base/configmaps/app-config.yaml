apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Environment
  NODE_ENV: "production"
  APP_ENV: "production"
  LOG_LEVEL: "info"

  # API Configuration
  API_PORT: "5000"
  API_HOST: "0.0.0.0"

  # Web Configuration
  WEB_PORT: "5001"
  WEB_HOST: "0.0.0.0"

  # Computation Engine
  COMPUTE_PORT: "8000"
  COMPUTE_HOST: "0.0.0.0"

  # Database Configuration (non-sensitive)
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  MONGODB_OPTIONS: "retryWrites=true&w=majority"

  ARANGO_HOST: "arangodb"
  ARANGO_PORT: "8529"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # CORS Settings - will be overridden in overlays
  CORS_ORIGIN: "*"

  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

  # Health Check Settings
  HEALTH_CHECK_ENABLED: "true"
  READINESS_CHECK_PATH: "/health"
  LIVENESS_CHECK_PATH: "/health"
