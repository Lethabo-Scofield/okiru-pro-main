# MongoDB Backup CronJob
# Runs daily at 2 AM to create a mongodump backup
#
# Backups are stored in PVC and synced to Azure Blob Storage for durability
# Requires: AZURE_STORAGE_ACCOUNT and AZURE_STORAGE_KEY secrets
# Secret template: See kubernetes/templates/secrets-template.yaml

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-backup-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: managed-csi-premium
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  labels:
    app: mongodb-backup
    component: database
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mongodump
              image: mongo:7.0
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "Starting MongoDB backup at $(date)"
                  BACKUP_DIR="/backup/$(date +%Y%m%d-%H%M%S)"
                  mkdir -p "$BACKUP_DIR"

                  # Perform backup
                  mongodump \
                    --host=mongodb \
                    --username="$MONGO_INITDB_ROOT_USERNAME" \
                    --password="$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase=admin \
                    --out="$BACKUP_DIR" \
                    --gzip

                  # Create metadata file
                  echo "Backup created: $(date -u)" > "$BACKUP_DIR/metadata.txt"
                  echo "MongoDB host: mongodb" >> "$BACKUP_DIR/metadata.txt"
                  echo "Database: $MONGODB_DB_NAME" >> "$BACKUP_DIR/metadata.txt"

                  # Cleanup old backups (keep last 7 days)
                  cd /backup
                  ls -t | tail -n +8 | xargs -r rm -rf

                  echo "Backup completed: $BACKUP_DIR"
                  ls -la "$BACKUP_DIR"
              env:
                - name: MONGO_INITDB_ROOT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-credentials
                      key: MONGO_INITDB_ROOT_USERNAME
                - name: MONGO_INITDB_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-credentials
                      key: MONGO_INITDB_ROOT_PASSWORD
                - name: MONGODB_DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-credentials
                      key: MONGODB_DB_NAME
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "250m"
          # Azure Blob Storage Sync Container
          # Uploads backups to Azure for off-cluster durability
            - name: azure-sync
              image: mcr.microsoft.com/azure-cli:latest
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "Starting Azure Blob Storage sync at $(date)"

                  # Install necessary tools
                  apk add --no-cache findutils coreutils

                  # Find the most recent backup directory
                  BACKUP_DIR=$(find /backup -type d -name "20*" | sort | tail -1)

                  if [ -z "$BACKUP_DIR" ]; then
                    echo "ERROR: No backup directory found"
                    exit 1
                  fi

                  echo "Syncing backup: $BACKUP_DIR"

                  # Upload to Azure Blob Storage
                  az storage blob upload-batch \
                    --account-name "$AZURE_STORAGE_ACCOUNT" \
                    --account-key "$AZURE_STORAGE_KEY" \
                    --destination "mongodb-backups/$(basename $BACKUP_DIR)" \
                    --source "$BACKUP_DIR" \
                    --overwrite true \
                    --validate-content

                  if [ $? -eq 0 ]; then
                    echo "✅ Successfully synced to Azure Blob Storage"
                    echo "Container: mongodb-backups"
                    echo "Path: $(basename $BACKUP_DIR)"
                  else
                    echo "❌ Azure sync failed"
                    exit 1
                  fi

                  # Cleanup Azure backups older than 30 days
                  echo "Cleaning up old Azure backups..."
                  CUTOFF_DATE=$(date -d '30 days ago' +%Y%m%d)

                  az storage blob list \
                    --account-name "$AZURE_STORAGE_ACCOUNT" \
                    --account-key "$AZURE_STORAGE_KEY" \
                    --container-name mongodb-backups \
                    --query "[].name" -o tsv | \
                  while read blob; do
                    # Extract date from blob path (format: YYYYMMDD-HHMMSS)
                    BLOB_DATE=$(echo "$blob" | grep -oE '^[0-9]{8}' || true)
                    if [ -n "$BLOB_DATE" ] && [ "$BLOB_DATE" -lt "$CUTOFF_DATE" ]; then
                      echo "Deleting old backup: $blob"
                      az storage blob delete \
                        --account-name "$AZURE_STORAGE_ACCOUNT" \
                        --account-key "$AZURE_STORAGE_KEY" \
                        --container-name mongodb-backups \
                        --name "$blob" \
                        --delete-snapshots include
                    fi
                  done

                  echo "Azure sync completed at $(date)"
              env:
                - name: AZURE_STORAGE_ACCOUNT
                  valueFrom:
                    secretKeyRef:
                      name: azure-backup-credentials
                      key: AZURE_STORAGE_ACCOUNT
                - name: AZURE_STORAGE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: azure-backup-credentials
                      key: AZURE_STORAGE_KEY
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
                  readOnly: true
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "250m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mongodb-backup-pvc
