apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: okiru-pro

resources:
- ../../base

# secrets are managed directly by the CI workflow via kubectl — NOT via Kustomize
# to prevent placeholder ${VAR} values from overwriting real cluster secrets on every deploy

patchesStrategicMerge:
- patches/ingress-patch.yaml
- patches/resource-limits.yaml
- patches/replica-count.yaml
- patches/configmap-patch.yaml
- patches/pvc-storage-class.yaml
- patches/security-context.yaml

# Images - updated during deployment
images:
- name: okiruproacrde4d539b.azurecr.io/okiru-pro/api
  newTag: 16a2b134-202605192312
- name: okiruproacrde4d539b.azurecr.io/okiru-pro/compute
  newTag: 16a2b134-202605192312
- name: okiruproacrde4d539b.azurecr.io/okiru-pro/web
  newTag: 16a2b134-202605192312

# Use 'labels' instead of 'commonLabels' to avoid modifying selectors
# which are immutable after deployment creation
labels:
- pairs:
    app.kubernetes.io/instance: okiru-pro-prod
    environment: production

configMapGenerator:
- behavior: merge
  literals:
  - NODE_ENV=production
  - LOG_LEVEL=warn
  - CORS_ORIGIN=https://okiru.pro,https://www.okiru.pro,https://okiru.20.164.101.114.nip.io
  name: app-config




