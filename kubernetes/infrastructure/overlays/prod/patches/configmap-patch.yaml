apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  LOG_LEVEL: "warn"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "200"
  CORS_ORIGIN: "https://okiru.20.164.101.114.nip.io"
  API_URL: "https://okiru.20.164.101.114.nip.io"
  NEXT_PUBLIC_API_URL: "https://okiru.20.164.101.114.nip.io"
  API_SERVER_URL: "http://api:5000"
  APP_BASE_URL: "https://okiru.20.164.101.114.nip.io"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    protected-mode yes
    tcp-keepalive 300
    timeout 0
    loglevel warning
