# Resource limits for single Standard_B4ms_v2 node (4 vCPU, 16 GB RAM).
# Total requests intentionally well under 14 GB usable so there is headroom
# for the OS, kubelet, and certificate-extraction burst workloads.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              memory: "400Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              memory: "300Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute
spec:
  template:
    spec:
      containers:
        - name: compute
          resources:
            requests:
              memory: "300Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  template:
    spec:
      containers:
        - name: mongodb
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "3Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arangodb
spec:
  template:
    spec:
      containers:
        - name: arangodb
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "1536Mi"
              cpu: "800m"
