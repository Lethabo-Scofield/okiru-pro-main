# This file is generated by the CI/CD pipeline from GitHub Secrets
# DO NOT commit real secret values to this file
# The GitHub Actions workflow will populate these from GitHub Secrets

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_MONGODB_CREDENTIALS
  MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
  MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
  MONGODB_URI: "${MONGODB_URI}"
  MONGODB_DB_NAME: "${MONGODB_DB_NAME}"

---
apiVersion: v1
kind: Secret
metadata:
  name: arangodb-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_ARANGODB_CREDENTIALS
  ARANGO_ROOT_PASSWORD: "${ARANGO_ROOT_PASSWORD}"
  ARANGO_URL: "${ARANGO_URL}"
  ARANGO_DB_NAME: "${ARANGO_DB_NAME}"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_REDIS_CREDENTIALS
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_URL: "${REDIS_URL}"

---
apiVersion: v1
kind: Secret
metadata:
  name: session-secrets
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_SESSION_SECRETS
  JWT_SECRET: "${JWT_SECRET}"
  SESSION_SECRET: "${SESSION_SECRET}"
  API_INTERNAL_KEY: "${API_INTERNAL_KEY}"

---
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull-secret
type: kubernetes.io/dockerconfigjson
data:
  # Populated by GitHub Actions from K8S_ACR_PULL_SECRET
  .dockerconfigjson: "${ACR_PULL_SECRET}"
