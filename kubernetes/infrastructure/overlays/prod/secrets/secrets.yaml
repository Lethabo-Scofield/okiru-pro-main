# Production Secrets Template
# IMPORTANT: This file is a template for CI/CD to populate from GitHub Secrets.
# Do NOT commit real secret values to this file.
# 
# How it works:
# - This file contains ${VAR} placeholders that are substituted by GitHub Actions
# - The workflow uses `envsubst` or similar to replace placeholders with actual secrets
# - After substitution, the rendered YAML is applied to the cluster
# - The original template with ${VAR} is safe to commit to git
#
# Required GitHub Secrets for production:
# - MONGO_INITDB_ROOT_USERNAME, MONGO_INITDB_ROOT_PASSWORD
# - MONGODB_URI, MONGODB_DB_NAME
# - ARANGO_ROOT_PASSWORD, ARANGO_URL, ARANGO_DB_NAME
# - REDIS_PASSWORD, REDIS_URL
# - JWT_SECRET, SESSION_SECRET, API_INTERNAL_KEY
# - ACR_PULL_SECRET (base64 encoded docker config)
# - AZURE_STORAGE_ACCOUNT, AZURE_STORAGE_KEY (for backup sync)
# - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM (OTP + invite emails)
# - GROQ_API_KEY (LLM features in /apps/web)
# - AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT,
#   AZURE_OPENAI_FAST_DEPLOYMENT, AZURE_OPENAI_EMBEDDING_DEPLOYMENT,
#   AZURE_OPENAI_API_VERSION (api + compute)
# - AZURE_STORAGE_CONNECTION_STRING, AZURE_STORAGE_ACCOUNT_NAME (cert uploads)
# - AZURE_SEARCH_ENDPOINT, AZURE_SEARCH_API_KEY, AZURE_SEARCH_INDEX_NAME (cert search)
# - ARANGO_USER, ARANGO_VERIFY_SSL (consumed alongside ARANGO_URL/PASSWORD)
#
# NOTE: This file is the *reference* template. The actual prod cluster gets
# its `external-api-keys` and `arangodb-credentials` populated imperatively
# by .github/workflows/deploy-prod.yml (see the "Create application secrets"
# step). Keep the two in sync when adding/removing keys.

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_MONGODB_CREDENTIALS
  MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
  MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
  MONGODB_URI: "${MONGODB_URI}"
  MONGODB_DB_NAME: "${MONGODB_DB_NAME}"

---
apiVersion: v1
kind: Secret
metadata:
  name: arangodb-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_ARANGODB_CREDENTIALS
  ARANGO_ROOT_PASSWORD: "${ARANGO_ROOT_PASSWORD}"
  ARANGO_PASSWORD: "${ARANGO_ROOT_PASSWORD}"
  ARANGO_URL: "${ARANGO_URL}"
  ARANGO_DB_NAME: "${ARANGO_DB_NAME}"
  ARANGO_DB: "${ARANGO_DB_NAME}"
  ARANGO_USER: "${ARANGO_USER}"
  ARANGO_VERIFY_SSL: "${ARANGO_VERIFY_SSL}"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_REDIS_CREDENTIALS
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_URL: "${REDIS_URL}"

---
apiVersion: v1
kind: Secret
metadata:
  name: session-secrets
type: Opaque
stringData:
  # Populated by GitHub Actions from K8S_SECRET_SESSION_SECRETS
  JWT_SECRET: "${JWT_SECRET}"
  SESSION_SECRET: "${SESSION_SECRET}"
  API_INTERNAL_KEY: "${API_INTERNAL_KEY}"


# acr-pull-secret is created directly by the GHA workflow via
# `kubectl create secret docker-registry` and should NOT be in Kustomize.

---
# Azure Blob Storage credentials for backup sync
apiVersion: v1
kind: Secret
metadata:
  name: azure-backup-credentials
type: Opaque
stringData:
  AZURE_STORAGE_ACCOUNT: "${AZURE_STORAGE_ACCOUNT}"
  AZURE_STORAGE_KEY: "${AZURE_STORAGE_KEY}"

---
# External API keys consumed by the api/web/compute deployments. All keys are
# optional at the K8s level (envFrom uses optional: true). Supply only the
# providers you actually use.
apiVersion: v1
kind: Secret
metadata:
  name: external-api-keys
type: Opaque
stringData:
  # SMTP — required for OTP verification + workspace invite emails
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_USER: "${SMTP_USER}"
  SMTP_PASS: "${SMTP_PASS}"
  SMTP_FROM: "${SMTP_FROM}"
  # LLM providers (use the ones your features need)
  GROQ_API_KEY: "${GROQ_API_KEY}"
  AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT}"
  AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY}"
  AZURE_OPENAI_DEPLOYMENT: "${AZURE_OPENAI_DEPLOYMENT}"
  AZURE_OPENAI_FAST_DEPLOYMENT: "${AZURE_OPENAI_FAST_DEPLOYMENT}"
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "${AZURE_OPENAI_EMBEDDING_DEPLOYMENT}"
  AZURE_OPENAI_API_VERSION: "${AZURE_OPENAI_API_VERSION}"
  # Azure Storage Blob (certificate uploads from /apps/api)
  AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING}"
  AZURE_STORAGE_ACCOUNT_NAME: "${AZURE_STORAGE_ACCOUNT_NAME}"
  # Azure AI Search (certificate ingestion + retrieval)
  AZURE_SEARCH_ENDPOINT: "${AZURE_SEARCH_ENDPOINT}"
  AZURE_SEARCH_API_KEY: "${AZURE_SEARCH_API_KEY}"
  AZURE_SEARCH_INDEX_NAME: "${AZURE_SEARCH_INDEX_NAME}"
