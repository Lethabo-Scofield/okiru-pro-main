apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: okiru-pro-staging

resources:
  - ../../base
  - secrets/secrets.yaml

patchesStrategicMerge:
  - patches/ingress-patch.yaml
  - patches/resource-limits.yaml
  - patches/replica-count.yaml

images:
  # TEMPORARY: Using placeholder images for infrastructure testing
  # GitHub Actions will update these to actual ACR images on deployment
  - name: okiruproacrde4d539b.azurecr.io/okiru-pro/api
    newName: nginx
    newTag: alpine
  - name: okiruproacrde4d539b.azurecr.io/okiru-pro/web
    newName: nginx
    newTag: alpine
  - name: okiruproacrde4d539b.azurecr.io/okiru-pro/compute
    newName: busybox
    newTag: "1.36"

commonLabels:
  environment: staging
  app.kubernetes.io/instance: okiru-pro-staging

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug
      - CORS_ORIGIN="*"
