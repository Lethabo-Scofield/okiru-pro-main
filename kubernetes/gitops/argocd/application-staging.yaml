apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: okiru-pro-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/okiru-pro-main.git
    targetRevision: develop  # Staging tracks develop branch
    path: kubernetes/infrastructure/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: okiru-pro-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
