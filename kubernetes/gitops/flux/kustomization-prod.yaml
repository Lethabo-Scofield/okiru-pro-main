# Flux Kustomization for Production Environment
# Automatically syncs and applies kubernetes/infrastructure/overlays/prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: okiru-pro-prod
  namespace: flux-system
spec:
  interval: 10m0s  # Longer interval for production (more conservative)
  path: ./kubernetes/infrastructure/overlays/prod
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: okiru-pro
  targetNamespace: okiru-pro
  timeout: 5m0s
  wait: true
  # Health checks for production deployments
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: api
      namespace: okiru-pro
    - apiVersion: apps/v1
      kind: Deployment
      name: web
      namespace: okiru-pro
    - apiVersion: apps/v1
      kind: Deployment
      name: compute
      namespace: okiru-pro
  # Post-build variable substitution from ConfigMap
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
        optional: true
  # Prevent accidental deletion
  deletionPolicy: Annotate
  # Suspend for maintenance (can be toggled via CLI)
  # suspend: false
---
# ImageUpdateAutomation for production
# Disabled by default - enable after setting up proper testing pipeline
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: okiru-pro-prod
  namespace: flux-system
  annotations:
    # Set to "true" to enable automated production deployments
    fluxcd.io/automated: "false"
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: okiru-pro
  git:
    checkout:
      ref:
        branch: main
    commit:
      authorName: Flux Bot
      authorEmail: flux@okiru.local
      messageTemplate: |
        [prod] Automated image update

        Images:
        {{ range .Updated.Images -}}
        - {{.}}
        {{ end -}}
    push:
      branch: main
  policy:
    # Only deploy images that pass semver validation
    semver:
      range: ">=1.0.0"
